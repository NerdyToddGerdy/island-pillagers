<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Island Pillaging</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="images/flag.png" />
  <link href="https://fonts.googleapis.com/css?family=Cinzel+Decorative|IM+Fell+English+SC" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/sweetalert2/6.4.4/sweetalert2.min.js"></script>
</head>
<body>
  <div class="container">

    <h1><img src="images/flag.png" alt="ARRGGG!!">  ISLAND PILLAGING</h1>
    <div id="setup">
      <span>Map Size:</span>
      <button class="size-btn active" data-cols="4">4 × 4</button>
      <button class="size-btn" data-cols="5">5 × 5</button>
      <button class="size-btn" data-cols="6">6 × 6</button>
    </div>
    <div class="map"></div>
    <div class="side-bar">
      <div class="button">End Phase</div>
      <div class="turns">
        <div id="player-turn"></div>
        <div id="phase"></div>
        <div id="round-counter">Round 1</div>
      </div>
      <div id="dice-result" hidden>
        <div id="dice-attacker"></div>
        <div id="dice-defender"></div>
        <div id="dice-outcome"></div>
      </div>
      <div class="scores"></div>
      <div class="rules"></div>
    </div>
  </div>
  <div class="footer">
    Created by <a href="https://twitter.com/NerdyToddGerdy?lang=en"> Todd C Gerdy</a> through the <a href="https://generalassemb.ly/">GA</a> WDIR course. | <a href="https://nerdytoddgerdy.github.io/nerdy-gerdy-games/">More Games</a>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
